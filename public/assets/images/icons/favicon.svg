  <text x="52" y="42" font-family="system-ui, sans-serif" font-size="6" fill="white" font-weight="600">2</text>
  <text x="12" y="42" font-family="system-ui, sans-serif" font-size="6" fill="white" font-weight="600">3</text>
</svg>