<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Circular track background -->
  <circle cx="32" cy="32" r="30" fill="#1E3A5F"/>
  
  <!-- Track lanes -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#C8553D" stroke-width="8"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  
  <!-- Infield -->
  <circle cx="32" cy="32" r="10" fill="#228B22"/>
  
  <!-- Running figure -->
  <g transform="translate(26, 20)">
    <circle cx="6" cy="0" r="5" fill="#D45500"/>
    <path d="M6 5 L6 18 M6 10 L0 14 M6 10 L12 14 M6 18 L3 28 M6 18 L9 28" stroke="#D45500" stroke-width="2.5" fill="none"/>
  </g>
  
  <!-- Lane numbers -->
