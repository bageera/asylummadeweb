<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7FFF00"/>
      <stop offset="100%" style="stop-color:#8A2BE2"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="60" fill="#000"/>
  
  <!-- Stylized runner (lightning bolt style) -->
  <g transform="translate(8, 8)" filter="url(#neonGlow)">
    <!-- Runner silhouette made of angular shapes -->
    <polygon points="0,30 8,10 16,22 24,8 32,20 28,30 20,28 12,44 4,38" fill="#7FFF00"/>
    <polygon points="8,10 16,0 24,8 16,22" fill="#8A2BE2"/>
    <!-- Speed lines -->
    <line x1="-4" y1="15" x2="-12" y2="15" stroke="#7FFF00" stroke-width="2" opacity="0.6"/>
    <line x1="-2" y1="22" x2="-8" y2="22" stroke="#8A2BE2" stroke-width="1.5" opacity="0.5"/>
    <line x1="-4" y1="28" x2="-10" y2="28" stroke="#7FFF00" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Text: ASYLUM (white) MADE (neon green) -->
  <g transform="translate(48, 18)">
    <!-- ASYLUM in white -->
    <text x="0" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">ASYLUM</text>
    <!-- MADE in neon green with purple border -->
    <text x="0" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#7FFF00" filter="url(#neonGlow)" letter-spacing="-0.5">MADE</text>
  </g>
  
  <!-- TRACK & FIELD tagline -->
  <text x="145" y="36" font-family="system-ui, sans-serif" font-size="8" fill="#888888" letter-spacing="1">TRACK</text>
  <text x="145" y="46" font-family="system-ui, sans-serif" font-size="8" fill="#8A2BE2" letter-spacing="1">FIELD</text>
  
  <!-- Lightning bolt accent -->
  <polygon points="180,8 186,8 182,16 190,16 174,32 180,20 172,20" fill="#7FFF00" opacity="0.8"/>
</svg>