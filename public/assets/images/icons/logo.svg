<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D45500"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <!-- Racing stripe -->
  <rect x="0" y="0" width="200" height="4" fill="url(#logoGrad)"/>
  
  <!-- Checkered accent -->
  <g transform="translate(0, 8)">
    <rect x="0" y="0" width="6" height="6" fill="#1E3A5F"/>
    <rect x="6" y="6" width="6" height="6" fill="#1E3A5F"/>
    <rect x="12" y="0" width="6" height="6" fill="#1E3A5F"/>
  </g>
  
  <!-- Text -->
  <text x="30" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#1E3A5F">ASYLUM</text>
  <text x="105" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="400" fill="#D45500">MADE</text>
  <text x="170" y="40" font-family="system-ui, sans-serif" font-size="24" font-weight="300" fill="#6B635A">TRACK</text>
  
  <!-- Underline -->
  <rect x="30" y="46" width="160" height="2" fill="url(#logoGrad)" opacity="0.5"/>
</svg>