<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D45500"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <!-- Track lanes accent -->
  <rect x="0" y="0" width="200" height="3" fill="#C8553D"/>
  <rect x="0" y="3" width="200" height="2" fill="white" opacity="0.5"/>
  <rect x="0" y="5" width="200" height="3" fill="#C8553D"/>
  
  <!-- Track spike/shoe icon -->
  <g transform="translate(8, 15)">
    <ellipse cx="12" cy="30" rx="10" ry="5" fill="#1E3A5F"/>
    <path d="M5 15 L12 30 L19 15 L12 5 Z" fill="url(#logoGrad)"/>
    <circle cx="12" cy="10" r="6" fill="#D45500"/>
    <!-- Spikes -->
    <line x1="8" y1="32" x2="8" y2="36" stroke="#1E3A5F" stroke-width="1"/>
    <line x1="12" y1="33" x2="12" y2="37" stroke="#1E3A5F" stroke-width="1"/>
    <line x1="16" y1="32" x2="16" y2="36" stroke="#1E3A5F" stroke-width="1"/>
  </g>
  
  <!-- Text -->
  <text x="40" y="35" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1E3A5F">ASYLUM MADE</text>
  <text x="165" y="35" font-family="system-ui, sans-serif" font-size="22" font-weight="400" fill="#D45500">TRACK</text>
  
  <!-- Underline with track lanes -->
  <rect x="40" y="42" width="150" height="3" fill="url(#logoGrad)"/>
  <text x="40" y="56" font-family="system-ui, sans-serif" font-size="11" fill="#6B635A">&amp; FIELD</text>
</svg>