<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="brightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="50%" style="stop-color:#B0E0E6"/>
      <stop offset="100%" style="stop-color:#E8F5E9"/>
    </linearGradient>
    <linearGradient id="redTrack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8553D"/>
      <stop offset="100%" style="stop-color:#9E3A28"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D45500"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#brightSky)"/>
  
  <!-- Racing stripe accent -->
  <rect x="0" y="0" width="1600" height="6" fill="url(#accentBar)"/>
  
  <!-- Clouds -->
  <g fill="white" opacity="0.7">
    <ellipse cx="200" cy="100" rx="80" ry="40"/>
    <ellipse cx="280" cy="90" rx="60" ry="35"/>
    <ellipse cx="120" cy="110" rx="50" ry="30"/>
    <ellipse cx="1200" cy="150" rx="100" ry="50"/>
    <ellipse cx="1300" cy="140" rx="70" ry="40"/>
    <ellipse cx="1100" cy="160" rx="60" ry="35"/>
  </g>
  
  <!-- Stadium background -->
  <rect x="0" y="500" width="1600" height="400" fill="#228B22"/>
  
  <!-- Track surface -->
  <rect x="0" y="400" width="1600" height="250" fill="url(#redTrack)"/>
  
  <!-- Lane lines -->
  <line x1="0" y1="430" x2="1600" y2="430" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="0" y1="470" x2="1600" y2="470" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="0" y1="510" x2="1600" y2="510" stroke="white" stroke-width="3" opacity="0.4"/>
  <line x1="0" y1="550" x2="1600" y2="550" stroke="white" stroke-width="3" opacity="0.3"/>
  <line x1="0" y1="590" x2="1600" y2="590" stroke="white" stroke-width="3" opacity="0.2"/>
  
  <!-- Starting blocks -->
  <g fill="#1E3A5F" opacity="0.4">
    <rect x="50" y="420" width="15" height="40"/>
    <rect x="50" y="470" width="15" height="40"/>
    <rect x="50" y="520" width="15" height="40"/>
  </g>
  
  <!-- Athlete silhouettes running -->
  <!-- Sprinter 1 - Youth -->
  <g transform="translate(300, 440)" fill="#D45500" opacity="0.9">
    <circle cx="0" cy="-15" r="14"/>
    <ellipse cx="5" cy="15" rx="18" ry="25"/>
    <rect x="-20" y="30" width="25" height="8" rx="4" transform="rotate(-45, -7, 34)"/>
    <rect x="15" y="25" width="30" height="8" rx="4" transform="rotate(30, 30, 29)"/>
    <rect x="-5" y="45" width="35" height="7" rx="3" transform="rotate(-20, 12, 48)"/>
    <rect x="20" y="40" width="30" height="7" rx="3" transform="rotate(60, 35, 43)"/>
    <!-- Speed lines -->
    <line x1="-35" y1="0" x2="-15" y2="0" stroke="#D45500" stroke-width="3" opacity="0.4"/>
    <line x1="-45" y1="15" x2="-20" y2="15" stroke="#D45500" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Sprinter 2 - Teen -->
  <g transform="translate(550, 500)" fill="#1E3A5F" opacity="0.9">
    <circle cx="0" cy="-15" r="14"/>
    <ellipse cx="5" cy="15" rx="18" ry="25"/>
    <rect x="-20" y="30" width="25" height="8" rx="4" transform="rotate(-30, -7, 34)"/>
    <rect x="15" y="28" width="28" height="8" rx="4" transform="rotate(20, 29, 32)"/>
    <rect x="-5" y="45" width="32" height="7" rx="3" transform="rotate(-15, 11, 48)"/>
    <rect x="18" y="42" width="28" height="7" rx="3" transform="rotate(50, 32, 45)"/>
    <!-- Speed lines -->
    <line x1="-35" y1="0" x2="-15" y2="0" stroke="#1E3A5F" stroke-width="3" opacity="0.4"/>
    <line x1="-45" y1="15" x2="-20" y2="15" stroke="#1E3A5F" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Sprinter 3 - Adult -->
  <g transform="translate(800, 460)" fill="#059669" opacity="0.9">
    <circle cx="0" cy="-15" r="14"/>
    <ellipse cx="5" cy="15" rx="18" ry="25"/>
    <rect x="-20" y="30" width="25" height="8" rx="4" transform="rotate(-40, -7, 34)"/>
    <rect x="15" y="25" width="30" height="8" rx="4" transform="rotate(25, 30, 29)"/>
    <rect x="-5" y="45" width="35" height="7" rx="3" transform="rotate(-25, 12, 48)"/>
    <rect x="20" y="40" width="30" height="7" rx="3" transform="rotate(55, 35, 43)"/>
    <!-- Speed lines -->
    <line x1="-35" y1="0" x2="-15" y2="0" stroke="#059669" stroke-width="3" opacity="0.4"/>
    <line x1="-45" y1="15" x2="-20" y2="15" stroke="#059669" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Finish line banner -->
  <rect x="1300" y="350" width="200" height="60" fill="#1E3A5F" rx="4"/>
  <text x="1400" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#F59E0B">FINISH</text>
  
  <!-- Timing display -->
  <rect x="30" y="350" width="150" height="70" fill="#1E3A5F" rx="8"/>
  <text x="105" y="390" text-anchor="middle" font-family="monospace" font-size="32" fill="#D45500">11.24</text>
  <text x="105" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">SECONDS</text>
  
  <!-- Text overlay -->
  <rect x="0" y="620" width="1600" height="280" fill="#1E3A5F" opacity="0.85"/>
  
  <g transform="translate(80, 680)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#FFFBF5">Built for Athletes of All Levels</text>
    <text x="0" y="50" font-family="system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)">Youth (6-18) and Masters (19+) programs • All skill levels welcome</text>
    <rect x="0" y="70" width="150" height="4" fill="url(#accentBar)" rx="2"/>
  </g>
  
  <!-- Photo placeholder indicator -->
  <g transform="translate(1500, 870)">
    <rect x="-80" y="-30" width="160" height="40" fill="#D45500" rx="4" opacity="0.9"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#FFFBF5">📷 Action Photo</text>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">1600×900</text>
  </g>
</svg>