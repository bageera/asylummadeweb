<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="trackBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF7ED"/>
      <stop offset="100%" style="stop-color:#FFF8F0"/>
    </linearGradient>
    <linearGradient id="car1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D45500"/>
      <stop offset="100%" style="stop-color:#FF7020"/>
    </linearGradient>
    <linearGradient id="car2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2E5478"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#trackBg)"/>
  
  <!-- Track surface -->
  <path d="M100 550 Q100 300 400 300 Q700 300 700 550" fill="none" stroke="#2A2A2A" stroke-width="80"/>
  <path d="M100 550 Q100 300 400 300 Q700 300 700 550" fill="none" stroke="#4A4A4A" stroke-width="60"/>
  
  <!-- Racing stripe accent -->
  <rect x="0" y="0" width="800" height="6" fill="#D45500"/>
  <rect x="0" y="6" width="800" height="4" fill="#F59E0B"/>
  
  <!-- Speed lines -->
  <line x1="50" y1="150" x2="200" y2="150" stroke="#E8DFD4" stroke-width="3"/>
  <line x1="30" y1="170" x2="180" y2="170" stroke="#E8DFD4" stroke-width="2"/>
  <line x1="60" y1="190" x2="160" y2="190" stroke="#E8DFD4" stroke-width="2"/>
  
  <!-- Car 1 (orange - leading) -->
  <g transform="translate(280, 260)">
    <!-- Car body -->
    <path d="M0 30 L20 10 L80 10 L100 30 L100 50 L0 50 Z" fill="url(#car1)"/>
    <!-- Windshield -->
    <path d="M25 15 L30 10 L70 10 L75 15 L70 25 L30 25 Z" fill="#1E3A5F" opacity="0.7"/>
    <!-- Number -->
    <circle cx="50" cy="35" r="12" fill="white"/>
    <text x="50" y="39" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#D45500">7</text>
    <!-- Wheels -->
    <circle cx="20" cy="50" r="12" fill="#1A1814"/>
    <circle cx="80" cy="50" r="12" fill="#1A1814"/>
    <!-- Speed effect -->
    <line x1="-30" y1="30" x2="-5" y2="30" stroke="#D45500" stroke-width="3" opacity="0.5"/>
    <line x1="-40" y1="35" x2="-10" y2="35" stroke="#D45500" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Car 2 (blue - following) -->
  <g transform="translate(450, 300)">
    <!-- Car body -->
    <path d="M0 30 L20 10 L80 10 L100 30 L100 50 L0 50 Z" fill="url(#car2)"/>
    <!-- Windshield -->
    <path d="M25 15 L30 10 L70 10 L75 15 L70 25 L30 25 Z" fill="#FFFBF5" opacity="0.7"/>
    <!-- Number -->
    <circle cx="50" cy="35" r="12" fill="white"/>
    <text x="50" y="39" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1E3A5F">21</text>
    <!-- Wheels -->
    <circle cx="20" cy="50" r="12" fill="#1A1814"/>
    <circle cx="80" cy="50" r="12" fill="#1A1814"/>
    <!-- Speed effect -->
    <line x1="-30" y1="30" x2="-5" y2="30" stroke="#1E3A5F" stroke-width="3" opacity="0.5"/>
    <line x1="-40" y1="35" x2="-10" y2="35" stroke="#1E3A5F" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Checkered flag in corner -->
  <g transform="translate(650, 30)">
    <rect x="0" y="0" width="5" height="80" fill="#1A1814"/>
    <rect x="5" y="0" width="60" height="40" fill="none" stroke="#1A1814" stroke-width="2"/>
    <rect x="5" y="0" width="10" height="10" fill="#1A1814"/>
    <rect x="25" y="0" width="10" height="10" fill="#1A1814"/>
    <rect x="45" y="0" width="10" height="10" fill="#1A1814"/>
    <rect x="15" y="10" width="10" height="10" fill="#1A1814"/>
    <rect x="35" y="10" width="10" height="10" fill="#1A1814"/>
    <rect x="55" y="10" width="10" height="10" fill="#1A1814"/>
  </g>
  
  <!-- Text area -->
  <rect x="50" y="450" width="300" height="100" rx="10" fill="#FFFBF5" opacity="0.95"/>
  <text x="70" y="490" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#1E3A5F">RACE DAY</text>
  <text x="70" y="520" font-family="system-ui, sans-serif" font-size="16" fill="#6B635A">Saturday Nights • Gates Open 4PM</text>
  <text x="70" y="540" font-family="system-ui, sans-serif" font-size="14" fill="#D45500">Riverview, FL</text>
</svg>