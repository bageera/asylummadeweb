<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="actionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="50%" style="stop-color:#D45500"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="900" fill="url(#actionGrad)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  
  <!-- Placeholder frame -->
  <rect x="100" y="100" width="1400" height="700" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" rx="8"/>
  <rect x="100" y="100" width="1400" height="700" fill="rgba(0,0,0,0.2)" rx="8"/>
  
  <!-- Image icon -->
  <g transform="translate(800, 380)">
    <rect x="-60" y="-40" width="120" height="80" fill="none" stroke="white" stroke-width="3" rx="4"/>
    <circle cx="-30" cy="-15" r="15" fill="none" stroke="white" stroke-width="2"/>
    <path d="M -50 30 L -20 5 L 10 25 L 30 10 L 50 30" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="10,5"/>
  </g>
  
  <!-- Instructions -->
  <text x="800" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="white">REPLACE WITH STOCK PHOTO</text>
  <text x="800" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.8)">Recommended: 1600×900px (16:9 aspect ratio)</text>
  
  <!-- Photo prompts -->
  <rect x="200" y="580" width="1200" height="180" fill="rgba(0,0,0,0.4)" rx="8"/>
  
  <text x="800" y="620" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#F59E0B">SUGGESTED UNSPLASH SEARCH:</text>
  
  <text x="800" y="660" text-anchor="middle" font-family="monospace" font-size="14" fill="white">"youth track sprinters racing diverse"</text>
  <text x="800" y="685" text-anchor="middle" font-family="monospace" font-size="14" fill="white">"track and field athletes running competition"</text>
  <text x="800" y="710" text-anchor="middle" font-family="monospace" font-size="14" fill="white">"sprinters mid race track level view"</text>
  
  <text x="800" y="750" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">Download from: unsplash.com → Save as: racing-action.jpg or racing-action.png</text>
  
  <!-- Branding overlay -->
  <rect x="0" y="850" width="1600" height="50" fill="rgba(0,0,0,0.5)"/>
  <text x="800" y="880" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">Asylum Made Track &amp; Field — Action Photo Placeholder</text>
</svg>