<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F8FF"/>
      <stop offset="100%" style="stop-color:#E8F5E9"/>
    </linearGradient>
    <linearGradient id="trackRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D45500"/>
      <stop offset="100%" style="stop-color:#B84700"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Racing stripe top -->
  <rect x="0" y="0" width="800" height="4" fill="#D45500"/>
  <rect x="0" y="4" width="800" height="2" fill="#F59E0B"/>
  
  <!-- Track surface -->
  <rect x="50" y="300" width="700" height="200" rx="20" fill="#C8553D"/>
  
  <!-- Lane lines -->
  <line x1="50" y1="340" x2="750" y2="340" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="380" x2="750" y2="380" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="420" x2="750" y2="420" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="460" x2="750" y2="460" stroke="white" stroke-width="2" opacity="0.6"/>
  
  <!-- Starting blocks -->
  <rect x="70" y="310" width="30" height="60" fill="#1E3A5F" opacity="0.3"/>
  <rect x="70" y="350" width="30" height="60" fill="#059669" opacity="0.3"/>
  <rect x="70" y="390" width="30" height="60" fill="#D45500" opacity="0.3"/>
  
  <!-- Athletes running -->
  <g transform="translate(200, 340)">
    <!-- Sprinter 1 -->
    <circle cx="0" cy="15" r="12" fill="#D45500"/>
    <ellipse cx="0" cy="45" rx="15" ry="20" fill="#D45500"/>
    <path d="M-5 65 L-15 85 M5 65 L20 75 L25 60" stroke="#D45500" stroke-width="4" fill="none"/>
    <!-- Speed lines -->
    <line x1="-30" y1="20" x2="-10" y2="20" stroke="#D45500" stroke-width="2" opacity="0.4"/>
    <line x1="-40" y1="30" x2="-15" y2="30" stroke="#D45500" stroke-width="2" opacity="0.3"/>
    <line x1="-35" y1="40" x2="-10" y2="40" stroke="#D45500" stroke-width="2" opacity="0.2"/>
  </g>
  
  <g transform="translate(350, 380)">
    <!-- Sprinter 2 -->
    <circle cx="0" cy="15" r="12" fill="#1E3A5F"/>
    <ellipse cx="0" cy="45" rx="15" ry="20" fill="#1E3A5F"/>
    <path d="M-5 65 L-20 80 M5 65 L15 85" stroke="#1E3A5F" stroke-width="4" fill="none"/>
    <!-- Speed lines -->
    <line x1="-30" y1="20" x2="-10" y2="20" stroke="#1E3A5F" stroke-width="2" opacity="0.4"/>
    <line x1="-40" y1="30" x2="-15" y2="30" stroke="#1E3A5F" stroke-width="2" opacity="0.3"/>
  </g>
  
  <g transform="translate(500, 350)">
    <!-- Sprinter 3 -->
    <circle cx="0" cy="15" r="12" fill="#059669"/>
    <ellipse cx="0" cy="45" rx="15" ry="20" fill="#059669"/>
    <path d="M-5 65 L-15 85 M5 65 L20 75 L25 60" stroke="#059669" stroke-width="4" fill="none"/>
    <!-- Speed lines -->
    <line x1="-30" y1="20" x2="-10" y2="20" stroke="#059669" stroke-width="2" opacity="0.4"/>
    <line x1="-40" y1="30" x2="-15" y2="30" stroke="#059669" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Finish line banner -->
  <rect x="650" y="280" width="120" height="40" fill="#1E3A5F"/>
  <text x="710" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">FINISH</text>
  
  <!-- Timing clock -->
  <rect x="30" y="280" width="100" height="50" rx="8" fill="#1E3A5F"/>
  <text x="80" y="310" text-anchor="middle" font-family="monospace" font-size="20" fill="#D45500">11.24</text>
  <text x="80" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="white">SECONDS</text>
  
  <!-- Text area -->
  <rect x="50" y="80" width="350" height="130" rx="10" fill="#FFFBF5" opacity="0.95"/>
  <text x="70" y="115" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#1E3A5F">100m Sprint</text>
  <text x="70" y="145" font-family="system-ui, sans-serif" font-size="16" fill="#6B635A">Youth &amp; Adult Divisions</text>
  <text x="70" y="170" font-family="system-ui, sans-serif" font-size="14" fill="#D45500">All skill levels welcome</text>
  <text x="70" y="195" font-family="system-ui, sans-serif" font-size="12" fill="#6B635A">Timing • Results • Standings</text>
</svg>