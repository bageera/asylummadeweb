<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="pitsBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0"/>
      <stop offset="100%" style="stop-color:#FEF7ED"/>
    </linearGradient>
    <linearGradient id="sunrise" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF7020;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#pitsBg)"/>
  
  <!-- Sunrise glow -->
  <rect width="800" height="300" fill="url(#sunrise)"/>
  
  <!-- Racing stripe top -->
  <rect x="0" y="0" width="800" height="4" fill="#D45500"/>
  <rect x="0" y="4" width="800" height="2" fill="#F59E0B"/>
  
  <!-- Pit row background -->
  <rect x="0" y="350" width="800" height="250" fill="#2A2A2A"/>
  <rect x="0" y="350" width="800" height="8" fill="#D45500"/>
  
  <!-- Pit stalls -->
  <g>
    <!-- Stall 1 -->
    <rect x="50" y="400" width="120" height="150" fill="#3A3A3A" stroke="#4A4A4A" stroke-width="2"/>
    <rect x="55" y="405" width="110" height="50" fill="#D45500" opacity="0.2"/>
    <circle cx="110" cy="490" r="20" fill="#1A1814" stroke="#4A4A4A" stroke-width="2"/>
    <text x="110" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#D45500">7</text>
    
    <!-- Stall 2 -->
    <rect x="200" y="400" width="120" height="150" fill="#3A3A3A" stroke="#4A4A4A" stroke-width="2"/>
    <rect x="205" y="405" width="110" height="50" fill="#1E3A5F" opacity="0.2"/>
    <circle cx="260" cy="490" r="20" fill="#1A1814" stroke="#4A4A4A" stroke-width="2"/>
    <text x="260" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E3A5F">21</text>
    
    <!-- Stall 3 -->
    <rect x="350" y="400" width="120" height="150" fill="#3A3A3A" stroke="#4A4A4A" stroke-width="2"/>
    <rect x="355" y="405" width="110" height="50" fill="#E11D48" opacity="0.2"/>
    <circle cx="410" cy="490" r="20" fill="#1A1814" stroke="#4A4A4A" stroke-width="2"/>
    <text x="410" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#E11D48">88</text>
    
    <!-- Stall 4 -->
    <rect x="500" y="400" width="120" height="150" fill="#3A3A3A" stroke="#4A4A4A" stroke-width="2"/>
    <rect x="505" y="405" width="110" height="50" fill="#059669" opacity="0.2"/>
    <circle cx="560" cy="490" r="20" fill="#1A1814" stroke="#4A4A4A" stroke-width="2"/>
    <text x="560" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#059669">14</text>
    
    <!-- Stall 5 -->
    <rect x="650" y="400" width="120" height="150" fill="#3A3A3A" stroke="#4A4A4A" stroke-width="2"/>
    <rect x="655" y="405" width="110" height="50" fill="#F59E0B" opacity="0.2"/>
    <circle cx="710" cy="490" r="20" fill="#1A1814" stroke="#4A4A4A" stroke-width="2"/>
    <text x="710" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F59E0B">3</text>
  </g>
  
  <!-- People silhouettes -->
  <circle cx="80" cy="370" r="8" fill="#6B635A"/>
  <circle cx="130" cy="375" r="8" fill="#6B635A"/>
  <circle cx="230" cy="370" r="8" fill="#6B635A"/>
  <circle cx="280" cy="372" r="8" fill="#6B635A"/>
  <circle cx="380" cy="368" r="8" fill="#6B635A"/>
  <circle cx="430" cy="374" r="8" fill="#6B635A"/>
  
  <!-- Text area -->
  <rect x="50" y="80" width="350" height="120" rx="8" fill="#FFFBF5" opacity="0.95"/>
  <text x="70" y="120" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#1E3A5F">PIT AREA</text>
  <text x="70" y="145" font-family="system-ui, sans-serif" font-size="14" fill="#6B635A">Teams prepare for race day.</text>
  <text x="70" y="165" font-family="system-ui, sans-serif" font-size="12" fill="#D45500">5 pit stalls • Equipment storage • Team staging</text>
  
  <!-- Racing flag corner -->
  <g transform="translate(700, 20)">
    <rect x="0" y="0" width="4" height="60" fill="#1A1814"/>
    <g transform="translate(4, 0)">
      <rect x="0" y="0" width="10" height="10" fill="#1A1814"/>
      <rect x="10" y="10" width="10" height="10" fill="#1A1814"/>
      <rect x="0" y="20" width="10" height="10" fill="#1A1814"/>
      <rect x="20" y="0" width="10" height="10" fill="#1A1814"/>
      <rect x="30" y="10" width="10" height="10" fill="#1A1814"/>
      <rect x="20" y="20" width="10" height="10" fill="#1A1814"/>
    </g>
  </g>
</svg>