<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="darkBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="neonGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7FFF00"/>
      <stop offset="100%" style="stop-color:#8A2BE2"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="900" fill="url(#darkBg3)"/>
  
  <!-- Neon stripe top -->
  <rect x="0" y="0" width="1600" height="4" fill="url(#neonGrad3)" filter="url(#glow3)"/>
  
  <!-- Stadium structure (simplified) -->
  <rect x="0" y="180" width="1600" height="150" fill="#0f0f0f"/>
  <g fill="#1a1a1a">
    <rect x="50" y="200" width="60" height="80"/>
    <rect x="130" y="200" width="60" height="80"/>
    <rect x="210" y="200" width="60" height="80"/>
    <rect x="1330" y="200" width="60" height="80"/>
    <rect x="1410" y="200" width="60" height="80"/>
    <rect x="1490" y="200" width="60" height="80"/>
  </g>
  
  <!-- Track surface -->
  <rect x="0" y="330" width="1600" height="120" fill="#1a1a1a"/>
  
  <!-- Lane lines -->
  <line x1="0" y1="360" x2="1600" y2="360" stroke="#7FFF00" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="400" x2="1600" y2="400" stroke="#8A2BE2" stroke-width="1.5" opacity="0.2"/>
  <line x1="0" y1="420" x2="1600" y2="420" stroke="#7FFF00" stroke-width="1" opacity="0.15"/>
  
  <!-- Infield grass -->
  <rect x="0" y="450" width="1600" height="450" fill="#0a0a0a"/>
  
  <!-- Field event areas -->
  <!-- Long jump pit -->
  <rect x="80" y="500" width="220" height="50" fill="#2a2a2a" rx="4"/>
  <rect x="80" y="550" width="220" height="120" fill="#222" rx="4"/>
  <text x="190" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#7FFF00" filter="url(#glow3)">LONG JUMP</text>
  <!-- Runway -->
  <rect x="300" y="520" width="180" height="10" fill="#1a1a1a"/>
  
  <!-- Shot put circle -->
  <circle cx="580" cy="620" r="55" fill="#1a1a1a" stroke="#7FFF00" stroke-width="3" filter="url(#glow3)"/>
  <circle cx="580" cy="620" r="50" fill="none" stroke="#8A2BE2" stroke-width="1" opacity="0.5"/>
  <text x="580" y="700" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">SHOT PUT</text>
  
  <!-- High jump area -->
  <rect x="820" y="480" width="140" height="140" fill="#0a0a0a" stroke="#8A2BE2" stroke-width="2"/>
  <!-- Standards -->
  <rect x="920" y="480" width="6" height="90" fill="#8A2BE2" filter="url(#glow3)"/>
  <rect x="955" y="480" width="6" height="90" fill="#8A2BE2" filter="url(#glow3)"/>
  <!-- Bar -->
  <line x1="920" y1="510" x2="961" y2="510" stroke="#7FFF00" stroke-width="4" filter="url(#glow3)"/>
  <!-- Landing mat -->
  <rect x="830" y="560" width="120" height="50" fill="#1a1a1a" rx="4"/>
  <text x="890" y="680" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">HIGH JUMP</text>
  
  <!-- Discus cage -->
  <rect x="1080" y="500" width="160" height="160" fill="none" stroke="#7FFF00" stroke-width="2" opacity="0.3"/>
  <circle cx="1160" cy="580" r="45" fill="#1a1a1a" stroke="#7FFF00" stroke-width="2" filter="url(#glow3)"/>
  <text x="1160" y="700" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">DISCUS</text>
  
  <!-- Athletes warming up -->
  <!-- Athlete 1 - Green -->
  <g transform="translate(380, 400)" fill="#7FFF00" filter="url(#glow3)">
    <circle cx="0" cy="0" r="10"/>
    <rect x="-8" y="10" width="16" height="30" rx="8"/>
    <rect x="-18" y="15" width="12" height="5" rx="2"/>
    <rect x="6" y="15" width="12" height="5" rx="2"/>
    <rect x="-5" y="40" width="4" height="25" rx="2"/>
    <rect x="1" y="40" width="4" height="25" rx="2"/>
  </g>
  
  <!-- Athlete 2 - Purple -->
  <g transform="translate(700, 410)" fill="#8A2BE2" filter="url(#glow3)">
    <circle cx="0" cy="0" r="10"/>
    <rect x="-8" y="10" width="16" height="30" rx="8"/>
    <rect x="-18" y="18" width="12" height="5" rx="2"/>
    <rect x="6" y="22" width="12" height="5" rx="2"/>
    <rect x="-5" y="40" width="4" height="25" rx="2"/>
    <rect x="1" y="40" width="4" height="25" rx="2"/>
    <!-- Baton -->
    <rect x="18" y="18" width="22" height="5" fill="#7FFF00" rx="2"/>
  </g>
  
  <!-- Athlete 3 - Green -->
  <g transform="translate(1350, 400)" fill="#7FFF00" filter="url(#glow3)">
    <circle cx="0" cy="0" r="10"/>
    <rect x="-8" y="10" width="16" height="30" rx="8"/>
    <rect x="-22" y="10" width="14" height="5" rx="2"/>
    <rect x="8" y="5" width="14" height="5" rx="2"/>
    <rect x="-5" y="40" width="4" height="25" rx="2"/>
    <rect x="1" y="40" width="4" height="25" rx="2"/>
  </g>
  
  <!-- Info panel -->
  <rect x="50" y="750" width="520" height="130" fill="#111" rx="8" stroke="#7FFF00" stroke-width="1" opacity="0.9"/>
  <text x="80" y="790" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">Training Location</text>
  <text x="80" y="825" font-family="system-ui, sans-serif" font-size="16" fill="#888888">📍 Riverview, Florida</text>
  <text x="80" y="855" font-family="system-ui, sans-serif" font-size="14" fill="#7FFF00" filter="url(#glow3)">Practice: Tue/Thu 6PM • Sat 9AM</text>
  
  <!-- Photo placeholder indicator -->
  <g transform="translate(1500, 870)">
    <rect x="-80" y="-30" width="160" height="40" fill="#1a1a1a" rx="4"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#7FFF00">📷 Facility Photo</text>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666666">1600×900</text>
  </g>
</svg>