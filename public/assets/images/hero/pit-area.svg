<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="morning" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FFE4B5;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="trackSurface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8553D"/>
      <stop offset="100%" style="stop-color:#9E3A28"/>
    </linearGradient>
    <linearGradient id="grassField" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#228B22"/>
      <stop offset="100%" style="stop-color:#1B5E20"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#E8F5E9"/>
  <rect width="800" height="300" fill="url(#morning)"/>
  
  <!-- Racing stripe top -->
  <rect x="0" y="0" width="800" height="4" fill="#D45500"/>
  <rect x="0" y="4" width="800" height="2" fill="#F59E0B"/>
  
  <!-- Field area -->
  <rect x="0" y="400" width="800" height="200" fill="url(#grassField)"/>
  
  <!-- Track lanes -->
  <rect x="0" y="350" width="800" height="50" fill="url(#trackSurface)"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="370" x2="800" y2="370" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="380" x2="800" y2="380" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="390" x2="800" y2="390" stroke="white" stroke-width="1" opacity="0.5"/>
  
  <!-- Long jump pit -->
  <rect x="100" y="450" width="150" height="30" fill="#E8D4A8"/>
  <rect x="100" y="480" width="150" height="80" fill="#D4C4A0"/>
  <text x="175" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1E3A5F">LONG JUMP</text>
  
  <!-- Shot put circle -->
  <circle cx="400" cy="500" r="35" fill="url(#trackSurface)" stroke="white" stroke-width="2"/>
  <text x="400" y="550" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1E3A5F">SHOT PUT</text>
  
  <!-- High jump area -->
  <rect x="550" y="420" width="80" height="80" fill="url(#grassField)" stroke="white" stroke-width="1"/>
  <!-- Standards -->
  <rect x="600" y="420" width="5" height="60" fill="#1E3A5F"/>
  <rect x="625" y="420" width="5" height="60" fill="#1E3A5F"/>
  <!-- Bar -->
  <line x1="600" y1="430" x2="630" y2="430" stroke="#D45500" stroke-width="3"/>
  <text x="600" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1E3A5F">HIGH JUMP</text>
  
  <!-- Athletes warming up -->
  <g transform="translate(50, 420)">
    <!-- Athlete stretching -->
    <circle cx="15" cy="0" r="10" fill="#D45500"/>
    <path d="M15 10 L15 35 M15 20 L5 30 M15 20 L25 30 M15 35 L10 55 M15 35 L20 55" stroke="#D45500" stroke-width="3" fill="none"/>
  </g>
  
  <g transform="translate(250, 430)">
    <!-- Athlete with baton -->
    <circle cx="15" cy="0" r="10" fill="#1E3A5F"/>
    <path d="M15 10 L15 35 M15 20 L5 30 M15 20 L25 30 M15 35 L10 55 M15 35 L20 55" stroke="#1E3A5F" stroke-width="3" fill="none"/>
    <rect x="25" y="25" width="20" height="5" fill="#F59E0B" rx="2"/>
  </g>
  
  <g transform="translate(450, 440)">
    <!-- Athlete throwing -->
    <circle cx="15" cy="0" r="10" fill="#059669"/>
    <path d="M15 10 L15 35 M15 20 L0 25 M15 20 L30 15 M15 35 L10 55 M15 35 L20 55" stroke="#059669" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Equipment shed -->
  <rect x="700" y="450" width="80" height="50" fill="#4A4A4A" stroke="#3A3A3A" stroke-width="2"/>
  <text x="740" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#6B635A">EQUIPMENT</text>
  
  <!-- Text area -->
  <rect x="50" y="80" width="300" height="140" rx="10" fill="#FFFBF5" opacity="0.95"/>
  <text x="70" y="115" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#1E3A5F">FIELD EVENTS</text>
  <text x="70" y="140" font-family="system-ui, sans-serif" font-size="14" fill="#6B635A">Track &amp; Field Facilities</text>
  <text x="70" y="165" font-family="system-ui, sans-serif" font-size="12" fill="#D45500">Long Jump • Triple Jump</text>
  <text x="70" y="180" font-family="system-ui, sans-serif" font-size="12" fill="#D45500">High Jump • Pole Vault</text>
  <text x="70" y="195" font-family="system-ui, sans-serif" font-size="12" fill="#D45500">Shot Put • Discus • Javelin</text>
  <text x="70" y="215" font-family="system-ui, sans-serif" font-size="11" fill="#6B635A">Full facility for all events</text>
</svg>