<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="afternoonSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64B5F6"/>
      <stop offset="100%" style="stop-color:#E3F2FD"/>
    </linearGradient>
    <linearGradient id="trackSurface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8553D"/>
      <stop offset="100%" style="stop-color:#9E3A28"/>
    </linearGradient>
    <linearGradient id="grassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D4A8"/>
      <stop offset="100%" style="stop-color:#D4C4A0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D45500"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#afternoonSky)"/>
  
  <!-- Racing stripe -->
  <rect x="0" y="0" width="1600" height="6" fill="url(#accentGrad)"/>
  
  <!-- Clouds -->
  <g fill="white" opacity="0.6">
    <ellipse cx="300" cy="80" rx="100" ry="40"/>
    <ellipse cx="400" cy="70" rx="80" ry="35"/>
    <ellipse cx="200" cy="90" rx="60" ry="30"/>
    <ellipse cx="1100" cy="100" rx="120" ry="50"/>
    <ellipse cx="1250" cy="90" rx="80" ry="40"/>
  </g>
  
  <!-- Stadium stands (background) -->
  <rect x="0" y="200" width="1600" height="150" fill="#E8E8E8"/>
  <g fill="#CCCCCC">
    <rect x="50" y="220" width="40" height="20"/>
    <rect x="100" y="220" width="40" height="20"/>
    <rect x="150" y="220" width="40" height="20"/>
    <rect x="200" y="220" width="40" height="20"/>
    <rect x="1300" y="220" width="40" height="20"/>
    <rect x="1350" y="220" width="40" height="20"/>
    <rect x="1400" y="220" width="40" height="20"/>
    <rect x="1450" y="220" width="40" height="20"/>
  </g>
  
  <!-- Track surface -->
  <rect x="0" y="350" width="1600" height="100" fill="url(#trackSurface)"/>
  <line x1="0" y1="370" x2="1600" y2="370" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="390" x2="1600" y2="390" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="0" y1="410" x2="1600" y2="410" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="430" x2="1600" y2="430" stroke="white" stroke-width="2" opacity="0.2"/>
  
  <!-- Infield grass -->
  <rect x="0" y="450" width="1600" height="450" fill="url(#grassGrad)"/>
  
  <!-- Long jump pit -->
  <rect x="100" y="500" width="200" height="40" fill="url(#sandGrad)" rx="2"/>
  <rect x="100" y="540" width="200" height="100" fill="url(#sandGrad)" rx="2"/>
  <text x="200" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1E3A5F">LONG JUMP</text>
  <!-- Runway -->
  <rect x="300" y="520" width="200" height="8" fill="url(#trackSurface)"/>
  
  <!-- Shot put circle -->
  <circle cx="600" cy="600" r="50" fill="url(#trackSurface)" stroke="white" stroke-width="3"/>
  <circle cx="600" cy="600" r="45" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  <text x="600" y="670" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#FFFBF5">SHOT PUT</text>
  <!-- Throwing sector -->
  <path d="M600 550 L500 750 L700 750 Z" fill="rgba(200,85,61,0.2)" stroke="none"/>
  
  <!-- High jump area -->
  <rect x="850" y="480" width="120" height="120" fill="url(#grassGrad)" stroke="white" stroke-width="2"/>
  <!-- Standards -->
  <rect x="930" y="480" width="6" height="80" fill="#1E3A5F"/>
  <rect x="965" y="480" width="6" height="80" fill="#1E3A5F"/>
  <!-- Bar -->
  <line x1="930" y1="500" x2="971" y2="500" stroke="#D45500" stroke-width="4"/>
  <!-- Landing mat -->
  <rect x="860" y="560" width="100" height="40" fill="#1E3A5F" rx="4"/>
  <text x="910" y="640" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#FFFBF5">HIGH JUMP</text>
  
  <!-- Discus cage (simplified) -->
  <rect x="1100" y="500" width="150" height="150" fill="none" stroke="#1E3A5F" stroke-width="3"/>
  <circle cx="1175" cy="575" r="40" fill="url(#trackSurface)" stroke="white" stroke-width="3"/>
  <text x="1175" y="680" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#FFFBF5">DISCUS</text>
  
  <!-- Athletes warming up -->
  <!-- Athlete 1 stretching -->
  <g transform="translate(400, 420)" fill="#D45500" opacity="0.8">
    <circle cx="0" cy="0" r="10"/>
    <rect x="-8" y="10" width="16" height="30" rx="8"/>
    <rect x="-20" y="15" width="15" height="6" rx="3"/>
    <rect x="5" y="15" width="15" height="6" rx="3"/>
    <rect x="-6" y="40" width="5" height="25" rx="2"/>
    <rect x="1" y="40" width="5" height="25" rx="2"/>
  </g>
  
  <!-- Athlete 2 with baton -->
  <g transform="translate(700, 430)" fill="#1E3A5F" opacity="0.8">
    <circle cx="0" cy="0" r="10"/>
    <rect x="-8" y="10" width="16" height="30" rx="8"/>
    <rect x="-20" y="15" width="15" height="6" rx="3"/>
    <rect x="5" y="20" width="15" height="6" rx="3"/>
    <rect x="-6" y="40" width="5" height="25" rx="2"/>
    <rect x="1" y="40" width="5" height="25" rx="2"/>
    <!-- Baton -->
    <rect x="20" y="18" width="25" height="5" fill="#F59E0B" rx="2"/>
  </g>
  
  <!-- Athlete 3 throwing -->
  <g transform="translate(1350, 420)" fill="#059669" opacity="0.8">
    <circle cx="0" cy="0" r="10"/>
    <rect x="-8" y="10" width="16" height="30" rx="8"/>
    <rect x="-25" y="10" width="20" height="6" rx="3"/>
    <rect x="5" y="5" width="18" height="6" rx="3"/>
    <rect x="-6" y="40" width="5" height="25" rx="2"/>
    <rect x="1" y="40" width="5" height="25" rx="2"/>
  </g>
  
  <!-- Info panel -->
  <rect x="50" y="750" width="500" height="120" fill="#1E3A5F" rx="8" opacity="0.9"/>
  <text x="80" y="790" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#FFFBF5">Training Location</text>
  <text x="80" y="825" font-family="system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)">📍 Riverview, Florida</text>
  <text x="80" y="850" font-family="system-ui, sans-serif" font-size="14" fill="#F59E0B">Practice: Tue/Thu 6PM • Sat 9AM</text>
  
  <!-- Photo placeholder indicator -->
  <g transform="translate(1500, 870)">
    <rect x="-80" y="-30" width="160" height="40" fill="#D45500" rx="4" opacity="0.9"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#FFFBF5">📷 Facility Photo</text>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">1600×900</text>
  </g>
</svg>