<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="facilityBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e8eaef"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4b2e83"/>
      <stop offset="100%" style="stop-color:#6b3ea3"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b7f2b"/>
      <stop offset="100%" style="stop-color:#7b9f3b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="900" fill="url(#facilityBg)"/>
  
  <!-- Top accent -->
  <rect x="0" y="0" width="1600" height="4" fill="url(#purpleGrad)"/>
  
  <!-- Stadium structure -->
  <rect x="0" y="180" width="1600" height="150" fill="#f4f6f8"/>
  <g fill="#e1e5ea">
    <rect x="50" y="200" width="60" height="80" rx="4"/>
    <rect x="130" y="200" width="60" height="80" rx="4"/>
    <rect x="210" y="200" width="60" height="80" rx="4"/>
    <rect x="1330" y="200" width="60" height="80" rx="4"/>
    <rect x="1410" y="200" width="60" height="80" rx="4"/>
    <rect x="1490" y="200" width="60" height="80" rx="4"/>
  </g>
  
  <!-- Track surface -->
  <rect x="0" y="330" width="1600" height="120" fill="#f4f6f8"/>
  
  <!-- Lane lines -->
  <line x1="0" y1="360" x2="1600" y2="360" stroke="#4b2e83" stroke-width="2" opacity="0.15"/>
  <line x1="0" y1="400" x2="1600" y2="400" stroke="#5b7f2b" stroke-width="1.5" opacity="0.12"/>
  <line x1="0" y1="420" x2="1600" y2="420" stroke="#4b2e83" stroke-width="1" opacity="0.1"/>
  
  <!-- Infield -->
  <rect x="0" y="450" width="1600" height="450" fill="#f8f9fa"/>
  
  <!-- Field event areas -->
  <!-- Long jump pit -->
  <rect x="80" y="500" width="220" height="50" fill="#f4f6f8" rx="4"/>
  <rect x="80" y="550" width="220" height="120" fill="#e8eaef" rx="4"/>
  <text x="190" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4b2e83">LONG JUMP</text>
  <rect x="300" y="520" width="180" height="10" fill="#e1e5ea" rx="2"/>
  
  <!-- Shot put circle -->
  <circle cx="580" cy="620" r="55" fill="#f4f6f8" stroke="#5b7f2b" stroke-width="3"/>
  <circle cx="580" cy="620" r="50" fill="none" stroke="#4b2e83" stroke-width="1" opacity="0.3"/>
  <text x="580" y="700" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1b1f24">SHOT PUT</text>
  
  <!-- High jump area -->
  <rect x="820" y="480" width="140" height="140" fill="#f8f9fa" stroke="#e1e5ea" stroke-width="1"/>
  <rect x="920" y="480" width="6" height="90" fill="#4b2e83"/>
  <rect x="955" y="480" width="6" height="90" fill="#4b2e83"/>
  <line x1="920" y1="510" x2="961" y2="510" stroke="#5b7f2b" stroke-width="4"/>
  <rect x="830" y="560" width="120" height="50" fill="#f4f6f8" rx="4"/>
  <text x="890" y="680" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1b1f24">HIGH JUMP</text>
  
  <!-- Discus cage -->
  <rect x="1080" y="500" width="160" height="160" fill="none" stroke="#4b2e83" stroke-width="2" opacity="0.2"/>
  <circle cx="1160" cy="580" r="45" fill="#f4f6f8" stroke="#4b2e83" stroke-width="2"/>
  <text x="1160" y="700" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1b1f24">DISCUS</text>
  
  <!-- Athletes warming up -->
  <g transform="translate(380, 400)" fill="#4b2e83">
    <circle cx="0" cy="0" r="10"/>
    <rect x="-8" y="10" width="16" height="30" rx="8"/>
    <rect x="-18" y="15" width="12" height="5" rx="2"/>
    <rect x="6" y="15" width="12" height="5" rx="2"/>
    <rect x="-5" y="40" width="4" height="25" rx="2"/>
    <rect x="1" y="40" width="4" height="25" rx="2"/>
  </g>
  
  <g transform="translate(700, 410)" fill="#5b7f2b">
    <circle cx="0" cy="0" r="10"/>
    <rect x="-8" y="10" width="16" height="30" rx="8"/>
    <rect x="-18" y="18" width="12" height="5" rx="2"/>
    <rect x="6" y="22" width="12" height="5" rx="2"/>
    <rect x="-5" y="40" width="4" height="25" rx="2"/>
    <rect x="1" y="40" width="4" height="25" rx="2"/>
    <rect x="18" y="18" width="22" height="5" fill="#4b2e83" rx="2"/>
  </g>
  
  <g transform="translate(1350, 400)" fill="#4b2e83">
    <circle cx="0" cy="0" r="10"/>
    <rect x="-8" y="10" width="16" height="30" rx="8"/>
    <rect x="-22" y="10" width="14" height="5" rx="2"/>
    <rect x="8" y="5" width="14" height="5" rx="2"/>
    <rect x="-5" y="40" width="4" height="25" rx="2"/>
    <rect x="1" y="40" width="4" height="25" rx="2"/>
  </g>
  
  <!-- Info panel -->
  <rect x="50" y="750" width="520" height="130" fill="white" rx="8"/>
  <rect x="50" y="750" width="520" height="130" fill="none" stroke="#e1e5ea" stroke-width="1" rx="8"/>
  <text x="80" y="790" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#1b1f24">Training Location</text>
  <text x="80" y="825" font-family="system-ui, sans-serif" font-size="16" fill="#6b7280">📍 Riverview, Florida</text>
  <text x="80" y="855" font-family="system-ui, sans-serif" font-size="14" fill="#4b2e83">Practice: Tue/Thu 6PM • Sat 9AM</text>
  
  <!-- Photo placeholder indicator -->
  <g transform="translate(1500, 870)">
    <rect x="-70" y="-25" width="140" height="35" fill="white" rx="4"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4b2e83">📷 Facility Photo</text>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">1600×900</text>
  </g>
</svg>