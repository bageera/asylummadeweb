<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="50%" style="stop-color:#f0f2f5"/>
      <stop offset="100%" style="stop-color:#e8eaef"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4b2e83"/>
      <stop offset="100%" style="stop-color:#6b3ea3"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b7f2b"/>
      <stop offset="100%" style="stop-color:#7b9f3b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="900" fill="url(#heroBg)"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e1e5ea" stroke-width="1"/>
  </pattern>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Track oval -->
  <ellipse cx="800" cy="650" rx="600" ry="180" fill="none" stroke="#e1e5ea" stroke-width="80"/>
  <ellipse cx="800" cy="650" rx="600" ry="180" fill="none" stroke="#4b2e83" stroke-width="3" opacity="0.3"/>
  <ellipse cx="800" cy="650" rx="560" ry="160" fill="none" stroke="#5b7f2b" stroke-width="2" opacity="0.2"/>
  <ellipse cx="800" cy="650" rx="520" ry="140" fill="none" stroke="#4b2e83" stroke-width="1" opacity="0.1"/>
  
  <!-- Infield -->
  <ellipse cx="800" cy="650" rx="440" ry="100" fill="#f4f6f8"/>
  
  <!-- Sprinter silhouettes -->
  <g transform="translate(250, 580)">
    <circle cx="0" cy="-5" r="12" fill="#4b2e83"/>
    <path d="M0 7 L0 35 M0 20 L-15 30 M0 20 L18 25 M0 35 L-8 55 M0 35 L12 52" stroke="#4b2e83" stroke-width="4" fill="none"/>
    <line x1="-30" y1="10" x2="-10" y2="10" stroke="#4b2e83" stroke-width="2" opacity="0.4"/>
    <line x1="-35" y1="20" x2="-15" y2="20" stroke="#4b2e83" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <g transform="translate(600, 600)">
    <circle cx="0" cy="-5" r="12" fill="#5b7f2b"/>
    <path d="M0 7 L0 35 M0 20 L-18 28 M0 20 L15 32 M0 35 L-10 55 M0 35 L10 50" stroke="#5b7f2b" stroke-width="4" fill="none"/>
    <line x1="-30" y1="10" x2="-10" y2="10" stroke="#5b7f2b" stroke-width="2" opacity="0.4"/>
    <line x1="-35" y1="20" x2="-15" y2="20" stroke="#5b7f2b" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <g transform="translate(950, 590)">
    <circle cx="0" cy="-5" r="12" fill="#4b2e83"/>
    <path d="M0 7 L0 35 M0 20 L-12 32 M0 20 L20 22 M0 35 L-5 55 M0 35 L14 48" stroke="#4b2e83" stroke-width="4" fill="none"/>
    <line x1="-30" y1="10" x2="-10" y2="10" stroke="#4b2e83" stroke-width="2" opacity="0.4"/>
    <line x1="-35" y1="20" x2="-15" y2="20" stroke="#4b2e83" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="150" r="80" fill="none" stroke="#4b2e83" stroke-width="2" opacity="0.1"/>
  <circle cx="100" cy="150" r="100" fill="none" stroke="#5b7f2b" stroke-width="1" opacity="0.08"/>
  
  <circle cx="1500" cy="100" r="60" fill="none" stroke="#4b2e83" stroke-width="2" opacity="0.1"/>
  <circle cx="1500" cy="100" r="80" fill="none" stroke="#5b7f2b" stroke-width="1" opacity="0.08"/>
  
  <!-- Hero text panel -->
  <rect x="80" y="200" width="550" height="180" fill="white" rx="8" opacity="0.95"/>
  <rect x="80" y="200" width="550" height="180" fill="none" stroke="#e1e5ea" stroke-width="1" rx="8"/>
  
  <text x="100" y="260" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#1b1f24">ASYLUM MADE</text>
  <text x="100" y="320" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#4b2e83">TRACK &amp; FIELD</text>
  <text x="100" y="360" font-family="system-ui, sans-serif" font-size="16" fill="#6b7280">Riverview, Florida • Youth &amp; Adult Programs</text>
  
  <!-- Purple accent bar -->
  <rect x="100" y="380" width="100" height="4" fill="url(#purpleGrad)" rx="2"/>
  
  <!-- Stats -->
  <g transform="translate(100, 420)">
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#4b2e83">50+</text>
    <text x="0" y="50" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" letter-spacing="1">ATHLETES</text>
    
    <text x="100" y="30" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#5b7f2b">15</text>
    <text x="100" y="50" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" letter-spacing="1">EVENTS</text>
    
    <text x="180" y="30" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#4b2e83">12</text>
    <text x="180" y="50" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" letter-spacing="1">MEETS</text>
  </g>
  
  <!-- Photo placeholder indicator -->
  <g transform="translate(1400, 850)">
    <rect x="-70" y="-25" width="140" height="35" fill="white" rx="4" opacity="0.9"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4b2e83">📷 Hero Photo</text>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">1600×900</text>
  </g>
</svg>