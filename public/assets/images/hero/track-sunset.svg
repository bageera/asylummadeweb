<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7020;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FEF7ED;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="track" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A"/>
      <stop offset="100%" style="stop-color:#2A2A2A"/>
    </linearGradient>
    <pattern id="checker" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#1A1814"/>
      <rect x="10" width="10" height="10" fill="#FFFBF5"/>
      <rect y="10" width="10" height="10" fill="#FFFBF5"/>
      <rect x="10" y="10" width="10" height="10" fill="#1A1814"/>
    </pattern>
  </defs>
  
  <!-- Sky gradient -->
  <rect width="800" height="600" fill="url(#sky)"/>
  
  <!-- Sun glow -->
  <circle cx="650" cy="120" r="80" fill="#FFB347" opacity="0.5"/>
  <circle cx="650" cy="120" r="60" fill="#FFD700" opacity="0.7"/>
  
  <!-- Track oval -->
  <ellipse cx="400" cy="400" rx="350" ry="150" fill="url(#track)" stroke="#E8DFD4" stroke-width="4"/>
  
  <!-- Inner track line -->
  <ellipse cx="400" cy="400" rx="300" ry="120" fill="none" stroke="#FFFBF5" stroke-width="2" opacity="0.3"/>
  
  <!-- Start/finish line -->
  <rect x="48" y="385" width="4" height="30" fill="url(#checker)"/>
  
  <!-- Racing cars silhouettes -->
  <g transform="translate(150, 350)">
    <rect x="0" y="0" width="80" height="25" rx="5" fill="#D45500"/>
    <circle cx="15" cy="28" r="10" fill="#1A1814"/>
    <circle cx="65" cy="28" r="10" fill="#1A1814"/>
  </g>
  
  <g transform="translate(350, 380)">
    <rect x="0" y="0" width="80" height="25" rx="5" fill="#1E3A5F"/>
    <circle cx="15" cy="28" r="10" fill="#1A1814"/>
    <circle cx="65" cy="28" r="10" fill="#1A1814"/>
  </g>
  
  <g transform="translate(550, 370)">
    <rect x="0" y="0" width="80" height="25" rx="5" fill="#E11D48"/>
    <circle cx="15" cy="28" r="10" fill="#1A1814"/>
    <circle cx="65" cy="28" r="10" fill="#1A1814"/>
  </g>
  
  <!-- Flag stand -->
  <rect x="720" y="200" width="10" height="120" fill="#1A1814"/>
  <rect x="730" y="200" width="60" height="40" fill="url(#checker)"/>
  
  <!-- Grandstand silhouette -->
  <path d="M0 500 L0 600 L200 600 L200 520 L100 480 L50 500 L0 500" fill="#1E3A5F" opacity="0.7"/>
  
  <!-- Text overlay area -->
  <rect x="0" y="500" width="800" height="100" fill="#FFFBF5" opacity="0.9"/>
  <text x="400" y="555" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#1E3A5F">ASYLUM MADE TRACK</text>
  <text x="400" y="580" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#6B635A">Riverview, Florida • Local Track League</text>
</svg>