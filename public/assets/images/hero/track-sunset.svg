<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7FFF00"/>
      <stop offset="100%" style="stop-color:#8A2BE2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="900" fill="url(#darkBg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Neon accent lines -->
  <line x1="0" y1="100" x2="1600" y2="100" stroke="#7FFF00" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="200" x2="1600" y2="200" stroke="#8A2BE2" stroke-width="1" opacity="0.05"/>
  <line x1="0" y1="800" x2="1600" y2="800" stroke="#7FFF00" stroke-width="1" opacity="0.1"/>
  
  <!-- Track oval (stylized) -->
  <ellipse cx="800" cy="650" rx="600" ry="180" fill="none" stroke="#1a1a1a" stroke-width="80"/>
  <ellipse cx="800" cy="650" rx="600" ry="180" fill="none" stroke="#7FFF00" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <ellipse cx="800" cy="650" rx="560" ry="160" fill="none" stroke="#8A2BE2" stroke-width="1" opacity="0.2"/>
  <ellipse cx="800" cy="650" rx="520" ry="140" fill="none" stroke="#7FFF00" stroke-width="1" opacity="0.1"/>
  
  <!-- Infield -->
  <ellipse cx="800" cy="650" rx="440" ry="100" fill="#0a0a0a"/>
  
  <!-- Sprinter silhouettes with neon glow -->
  <!-- Sprinter 1 - Green -->
  <g transform="translate(250, 580)" filter="url(#glow)">
    <circle cx="0" cy="-5" r="12" fill="#7FFF00"/>
    <path d="M0 7 L0 35 M0 20 L-15 30 M0 20 L18 25 M0 35 L-8 55 M0 35 L12 52" stroke="#7FFF00" stroke-width="4" fill="none"/>
    <!-- Speed lines -->
    <line x1="-30" y1="10" x2="-10" y2="10" stroke="#7FFF00" stroke-width="2" opacity="0.5"/>
    <line x1="-35" y1="20" x2="-15" y2="20" stroke="#7FFF00" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <!-- Sprinter 2 - Purple -->
  <g transform="translate(600, 600)" filter="url(#glow)">
    <circle cx="0" cy="-5" r="12" fill="#8A2BE2"/>
    <path d="M0 7 L0 35 M0 20 L-18 28 M0 20 L15 32 M0 35 L-10 55 M0 35 L10 50" stroke="#8A2BE2" stroke-width="4" fill="none"/>
    <!-- Speed lines -->
    <line x1="-30" y1="10" x2="-10" y2="10" stroke="#8A2BE2" stroke-width="2" opacity="0.5"/>
    <line x1="-35" y1="20" x2="-15" y2="20" stroke="#8A2BE2" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <!-- Sprinter 3 - Green -->
  <g transform="translate(950, 590)" filter="url(#glow)">
    <circle cx="0" cy="-5" r="12" fill="#7FFF00"/>
    <path d="M0 7 L0 35 M0 20 L-12 32 M0 20 L20 22 M0 35 L-5 55 M0 35 L14 48" stroke="#7FFF00" stroke-width="4" fill="none"/>
    <!-- Speed lines -->
    <line x1="-30" y1="10" x2="-10" y2="10" stroke="#7FFF00" stroke-width="2" opacity="0.5"/>
    <line x1="-35" y1="20" x2="-15" y2="20" stroke="#7FFF00" stroke-width="1.5" opacity="0.3"/>
  </g>
  
  <!-- Lightning bolts -->
  <polygon points="100,150 120,150 108,180 135,180 85,240 105,195 75,195" fill="#7FFF00" opacity="0.8" filter="url(#glow)"/>
  <polygon points="1450,100 1470,100 1458,130 1485,130 1435,190 1455,145 1425,145" fill="#8A2BE2" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Hero text -->
  <rect x="80" y="200" width="600" height="200" fill="#0a0a0a" opacity="0.8" rx="8"/>
  <text x="100" y="260" font-family="system-ui, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF">ASYLUM MADE</text>
  <text x="100" y="320" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#7FFF00" filter="url(#glow)">TRACK &amp; FIELD</text>
  <text x="100" y="360" font-family="system-ui, sans-serif" font-size="18" fill="#888888">Riverview, Florida • Youth &amp; Adult Programs</text>
  
  <!-- Neon accent bar -->
  <rect x="100" y="380" width="150" height="4" fill="url(#neonGrad)" rx="2" filter="url(#glow)"/>
  
  <!-- Stats -->
  <g transform="translate(100, 420)">
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#7FFF00" filter="url(#glow)">50+</text>
    <text x="0" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#888888">ATHLETES</text>
    
    <text x="120" y="30" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#8A2BE2" filter="url(#glow)">15</text>
    <text x="120" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#888888">EVENTS</text>
    
    <text x="220" y="30" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#7FFF00" filter="url(#glow)">12</text>
    <text x="220" y="50" font-family="system-ui, sans-serif" font-size="12" fill="#888888">MEETS</text>
  </g>
  
  <!-- Photo placeholder indicator -->
  <g transform="translate(1400, 850)">
    <rect x="-80" y="-30" width="160" height="40" fill="#1a1a1a" rx="4"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#7FFF00">📷 Hero Photo</text>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666666">1600×900</text>
  </g>
</svg>